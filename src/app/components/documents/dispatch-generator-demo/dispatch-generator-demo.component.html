<div class="dispatch-generator-demo">
  <div class="actions">
    <button type="button" class="btn btn-primary" (click)="generateDocument()">
      Generar documento
    </button>
  </div>

  <div class="demo-content">
    <div #dispatchDocumentHost class="document-panel">
      <lct-dispatch-generator [dispatchPdf]="dispatchPdfData"></lct-dispatch-generator>
    </div>

    <div class="example-panel">
      <label class="example-title" for="dispatch-payload-example">Ejemplo payload dispatchPdf</label>
      <textarea
        id="dispatch-payload-example"
        class="example-textarea"
        [value]="dispatchPdfExample"
        readonly
      ></textarea>
    </div>
  </div>
</div>
